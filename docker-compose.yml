services:
  postgres:
    image: postgres:16-alpine
    container_name: ami_postgres
    environment:
      POSTGRES_USER: ami
      POSTGRES_PASSWORD: ami
      POSTGRES_DB: ami_copiloto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ami -d ami_copiloto"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ami_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  chroma:
    image: chromadb/chroma:0.5.5
    container_name: ami_chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ami_api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ami:ami@postgres:5432/ami_copiloto
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./app:/srv/app/app

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ami_worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ami:ami@postgres:5432/ami_copiloto
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "-m", "app.workers.proactive_engine"]
    volumes:
      - ./app:/srv/app/app

volumes:
  postgres_data:
  chroma_data:
